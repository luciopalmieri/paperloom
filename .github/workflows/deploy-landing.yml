name: Deploy landing to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "web/**"
      - "pnpm-workspace.yaml"
      - "pnpm-lock.yaml"
      - "package.json"
      - ".github/workflows/deploy-landing.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  LANDING_BASE_PATH: /paperloom
  LANDING_DEFAULT_LOCALE: en

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build landing (static export)
        working-directory: web
        env:
          LANDING_MODE: "1"
          LANDING_BASE_PATH: ${{ env.LANDING_BASE_PATH }}
          LANDING_DEFAULT_LOCALE: ${{ env.LANDING_DEFAULT_LOCALE }}
        run: pnpm build:landing

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
